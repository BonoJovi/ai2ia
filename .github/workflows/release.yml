name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result || steps.get-existing-release.outputs.release_id }}
      release_exists: ${{ steps.check-release.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: get version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: check if release exists
        id: check-release
        run: |
          if gh release view "v${PACKAGE_VERSION}" &>/dev/null; then
            echo "Release v${PACKAGE_VERSION} already exists, skipping..."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release v${PACKAGE_VERSION} does not exist, creating..."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: generate release notes
        if: steps.check-release.outputs.exists == 'false'
        id: release-notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            echo "Generating notes from $PREV_TAG to HEAD"
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --no-merges)
          fi

          FEAT=""
          FIX=""
          REFACTOR=""
          DOCS=""
          CI=""
          TEST=""
          CHORE=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" | grep -qi "\[skip ci\]" && continue
            echo "$line" | grep -qi "^Revert" && continue

            if echo "$line" | grep -qE "^feat(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^feat(\(.*\))?:\s*//')
              FEAT="${FEAT}- ${MSG}\n"
            elif echo "$line" | grep -qE "^fix(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^fix(\(.*\))?:\s*//')
              FIX="${FIX}- ${MSG}\n"
            elif echo "$line" | grep -qE "^refactor(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^refactor(\(.*\))?:\s*//')
              REFACTOR="${REFACTOR}- ${MSG}\n"
            elif echo "$line" | grep -qE "^docs(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^docs(\(.*\))?:\s*//')
              DOCS="${DOCS}- ${MSG}\n"
            elif echo "$line" | grep -qE "^ci(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^ci(\(.*\))?:\s*//')
              CI="${CI}- ${MSG}\n"
            elif echo "$line" | grep -qE "^test(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^test(\(.*\))?:\s*//')
              TEST="${TEST}- ${MSG}\n"
            elif echo "$line" | grep -qE "^chore(\(.*\))?:"; then
              MSG=$(echo "$line" | sed -E 's/^chore(\(.*\))?:\s*//')
              CHORE="${CHORE}- ${MSG}\n"
            else
              OTHER="${OTHER}- ${line}\n"
            fi
          done <<< "$COMMITS"

          NOTES="## What's Changed\n\n"

          [ -n "$FEAT" ] && NOTES="${NOTES}### ✨ Features\n${FEAT}\n"
          [ -n "$FIX" ] && NOTES="${NOTES}### 🐛 Bug Fixes\n${FIX}\n"
          [ -n "$REFACTOR" ] && NOTES="${NOTES}### ♻️ Refactoring\n${REFACTOR}\n"
          [ -n "$DOCS" ] && NOTES="${NOTES}### 📚 Documentation\n${DOCS}\n"
          [ -n "$CI" ] && NOTES="${NOTES}### 🔧 CI/CD\n${CI}\n"
          [ -n "$TEST" ] && NOTES="${NOTES}### 🧪 Tests\n${TEST}\n"
          [ -n "$CHORE" ] && NOTES="${NOTES}### 🔨 Chores\n${CHORE}\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}### 📝 Other\n${OTHER}\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${PACKAGE_VERSION}"
          fi

          echo -e "$NOTES" > release_notes.md
          cat release_notes.md

      - name: create release
        id: create-release
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.PACKAGE_VERSION}`,
              name: `ai2ia v${process.env.PACKAGE_VERSION}`,
              body: releaseNotes,
              draft: true,
              prerelease: false
            })
            return data.id

      - name: get existing release id
        id: get-existing-release
        if: steps.check-release.outputs.exists == 'true'
        run: |
          RELEASE_ID=$(gh release view "v${PACKAGE_VERSION}" --json id --jq '.id' | sed 's/.*_//')
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        run: npm install -g pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          tauriScript: pnpm tauri

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: [create-release, build-tauri]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: get version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: publish release
        if: needs.create-release.outputs.release_exists == 'false'
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })

      - name: skip publish (release already exists)
        if: needs.create-release.outputs.release_exists == 'true'
        run: echo "Release already exists and is published, skipping publish step."
